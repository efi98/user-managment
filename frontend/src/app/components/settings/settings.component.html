<div class="settings-container">
    <h2>{{header()}}</h2>

    <app-user-card
            [config]="formConfig"
            [loading]="loading()"
            (submitted)="onSubmitted($event)"
            (avatarChanged)="onAvatarChanged($event)"
            (avatarDeleted)="onAvatarDeleted()"
            (deleted)="onDeleted()"
            (cancelled)="onCancelled()">
    </app-user-card>
</div>
